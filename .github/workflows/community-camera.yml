name: Community camera submission

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write

concurrency:
  group: community-cameras
  cancel-in-progress: false

jobs:
  process:
    # Only camera submissions, and only when either:
    #  - a maintainer added the `approved` label (publish), or
    #  - the issue was opened/edited while open (validate & queue).
    if: >
      contains(github.event.issue.labels.*.name, 'camera-submission') &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'approved') ||
        (github.event.action != 'labeled' && github.event.issue.state == 'open')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event.action }}" = "labeled" ] && [ "${{ github.event.label.name }}" = "approved" ]; then
            echo "approve=true" >> "$GITHUB_OUTPUT"
          else
            echo "approve=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate / apply submission
        id: apply
        env:
          APPLY_MODE: ${{ steps.mode.outputs.approve == 'true' && 'apply' || 'validate' }}
        run: node scripts/apply-camera-issue.mjs

      - name: Commit approved camera
        if: steps.apply.outputs.status == 'added'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/community-cameras.json
          git commit -m "Add community camera from #${{ github.event.issue.number }}"
          git push

      - name: Comment result
        uses: actions/github-script@v7
        with:
          script: |
            const status = ${{ toJSON(steps.apply.outputs.status) }};
            const message = ${{ toJSON(steps.apply.outputs.message) }};
            const approve = ${{ steps.mode.outputs.approve == 'true' }};
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;

            let body;
            let close = false;
            let addLabel = null;

            if (status === 'valid') {
              body = `⏳ **Pending approval.** ${message}\n\nA maintainer will add the \`approved\` label to publish it for everyone.`;
              addLabel = 'pending-approval';
            } else if (status === 'added') {
              body = `✅ **Published.** ${message}\n\nLive for everyone within a minute.`;
              close = true;
            } else if (status === 'duplicate') {
              body = `ℹ️ ${message}`;
              close = true;
            } else {
              body = `⚠️ Could not accept this camera: ${message}\n\nEdit the issue with valid values (South Carolina coordinates).`;
            }

            await github.rest.issues.createComment({ owner, repo, issue_number, body });

            if (addLabel) {
              try {
                await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [addLabel] });
              } catch (e) { /* label may already exist on issue */ }
            }
            if (close) {
              await github.rest.issues.update({ owner, repo, issue_number, state: 'closed' });
            }
